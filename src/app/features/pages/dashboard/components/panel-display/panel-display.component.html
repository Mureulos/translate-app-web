<form class="w-full h-full glass-effect panel-display">
    <app-lang-selector></app-lang-selector>

    <textarea 
        matInput 
        [formControl]="translationControl" 
        readonly 
        class="font-sans font-semibold h-full"
    ></textarea>

    <div class="flex justify-between items-end max-h-[70px] h-full">
        <div class="flex gap-2">
            <p-button icon="pi pi-volume-up" />
            <p-button (onClick)="copyText(translationControl.value || '')" icon="pi pi-copy" />
        </div>

        @if (authService.isAuthenticated()) {
          <p-button 
            (onClick)="favoriteTranslation()"
            icon="pi pi-star"
          />
        }
    </div>
</form>
