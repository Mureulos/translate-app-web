<form class="relative w-full h-full glass-effect panel-display pb-20">
    <app-lang-selector></app-lang-selector>

    <textarea 
        matInput 
        [formControl]="translationControl" 
        readonly 
        class="font-sans font-semibold cursor-not-allowed select-none"
    ></textarea>

    <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end">
        <div class="flex gap-2">
            <p-button icon="pi pi-volume-up" />
            <p-button (onClick)="copyText(translationControl.value || '')" icon="pi pi-copy" />
        </div>

        @if (authService.isAuthenticated()) {
            @if (this.isFavorited) {
                <p-button 
                    (onClick)="deleteFavoriteTranslation()"
                    icon="pi pi-star-fill"
                />
            } @else { 
                <p-button 
                  (onClick)="favoriteTranslation()"
                  icon="pi pi-star"
                />
            }
        }
    </div>
</form>
