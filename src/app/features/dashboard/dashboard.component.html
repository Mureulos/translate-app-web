<header class="absolute flex justify-end items-center p-8 z-20 h-auto w-full">
  <div class="relative group inline-block">
    <div class="bg-primary rounded-xl relative">
      @if (!_authService.isAuthenticated()) {
        <button
          (click)="this.router.navigate(['/login'])"
          class="group/btn relative overflow-hidden px-6 py-3 rounded-xl box-content text-xs font-bold w-12 bg-glass-effect outline outline-3 outline-offset-4 outline-primary transition-all duration-300 hover:outline-orion-nebula"
        >
          <div
            class="absolute inset-0 bg-highlight-gradient opacity-0 transition-opacity duration-300 group-hover/btn:opacity-100"
          ></div>

          <span class="relative z-10">Sign In</span>
        </button>
      } @else {
        <button
          (click)="this.logout()"
          class="group/btn relative overflow-hidden px-6 py-3 rounded-xl box-content text-xs font-bold w-12 bg-glass-effect outline outline-3 outline-offset-4 outline-primary transition-all duration-300 hover:outline-orion-nebula"
        >
          <div
            class="absolute inset-0 bg-highlight-gradient opacity-0 transition-opacity duration-300 group-hover/btn:opacity-100"
          ></div>

          <span class="relative z-10">Log out</span>
        </button>
      }
    </div>
  </div>
</header>

<figure class="absolute top-0 z-10 w-full">
  <img
    src="assets/img/jpg/hero_img.jpg"
    alt="Banner"
    class="object-cover w-full h-96"
  />
</figure>

<figure class="absolute top-24 z-20 flex justify-center w-full">
  <img src="assets/img/svg/logo.svg" alt="translate.io" class="h-14" />
</figure>

<p-stepper
  [(value)]="activeStep"
  class="relative z-20 top-60 flex flex-col items-center gap-4 p-8 mx-auto w-full max-w-[1200px]"
>
  <p-step-panels class="w-full">
    <p-step-panel [value]="1">
      <ng-template #content>
        <div class="wrapper">
          <div class="flex items-stretch justify-center flex-wrap gap-4 w-full">
            <app-panel-input
              class="w-full laptop:w-auto laptop:flex-1"
              (textEvent)="updateText($event)"
            />

            <app-panel-display
              class="w-full laptop:w-auto laptop:flex-1"
              [translation]="translation"
              [text]="text"
            />
          </div>

          <p-button
            label="Saved"
            severity="secondary"
            (onClick)="activeStep = 2"
            class="mt-4"
          />
        </div>
      </ng-template>
    </p-step-panel>

    <p-step-panel [value]="2">
      <ng-template #content>
        <div class="wrapper">
          <div
            class="flex flex-col items-center gap-4 glass-effect p-8 rounded-xl w-full"
          >
            <h2 class="text-2xl font-bold text-white">Step 2</h2>
          </div>

          <p-button
            label="Translate"
            severity="secondary"
            (onClick)="activeStep = 1"
          />
        </div>
      </ng-template>
    </p-step-panel>
  </p-step-panels>
</p-stepper>
